<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Карта лагеря «Проектоград»</title>
<style>
  :root{
    --primary:#5352EE;  
    --accent:#FFD166;
    --light:#9996FF;
    --ink:#2b2a55;
    --bg:#f7f7fc;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  a{text-decoration:none; color:inherit;}
  ul{list-style:none;}
  body{
    font-family:"Poppins","Segoe UI",Arial,sans-serif;
    background:var(--bg);
    color:var(--ink);
  }

  header.topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 32px;
    background:#fff;
    border-bottom:1px solid #eee;
  }
  .logo{
    font-size:24px;
    font-weight:700;
    color:var(--ink);
  }
  .logo .dot{color:var(--accent);}
  .socials{display:flex; gap:14px;}
  .socials a{color:var(--primary); display:flex;}
  .socials svg{width:18px; height:18px;}

  nav.mainnav{
    background:var(--bg);
  }
  nav.mainnav ul{
    display:flex;
    justify-content:center;
    gap:40px;
    padding:16px 0;
    flex-wrap:wrap;
  }
  nav.mainnav a{
    font-weight:600;
    font-size:14px;
    color:var(--ink);
  }
  nav.mainnav li.active a{color:var(--primary);}
  nav.mainnav a:hover{color:var(--primary);}

  .layout{
    display:flex;
    height:calc(100vh - 130px);
    min-height:560px;
  }

  /* ===== MAP ===== */
  .map-wrap{
    position:relative;
    flex:1;
    overflow:hidden;
    background:#fbfbff;
    border-right:1px solid #e4e3ff;
  }
  svg#map{
    width:100%;
    height:100%;
    display:block;
    cursor:grab;
    touch-action:none;
  }
  svg#map:active{cursor:grabbing;}

  .building{
    fill:var(--light);
    fill-opacity:.55;
    stroke:var(--primary);
    stroke-width:2;
  }
  .building.secondary{
    fill:#c9c8ff;
    fill-opacity:.5;
    stroke:#b5b3f5;
    stroke-width:1.5;
  }
  .lawn{
    fill:#dff2df;
    stroke:none;
  }
  .path-line{
    stroke:#e2e1f0;
    stroke-width:6;
    fill:none;
    stroke-linecap:round;
  }
  .water{
    fill:#cfe4ff;
  }
  .label{
    font-size:15px;
    font-weight:700;
    fill:var(--primary);
    pointer-events:none;
    text-shadow:0 1px 2px #fff;
  }
  .sublabel{
    font-size:11px;
    fill:#8b89c9;
    font-weight:600;
    pointer-events:none;
  }

  .marker{
    cursor:pointer;
  }
  .marker circle.pin{
    fill:var(--accent);
    stroke:var(--primary);
    stroke-width:2.5;
    transition:r .15s ease;
  }
  .marker text.icon{
    font-size:14px;
    text-anchor:middle;
    dominant-baseline:central;
    pointer-events:none;
  }
  .marker:hover circle.pin{
    fill:#fff;
  }
  .marker.active circle.pin{
    fill:var(--primary);
    stroke:var(--accent);
    stroke-width:3;
  }
  .marker.active text.icon{
    filter: brightness(4);
  }

  /* ===== CONTROLS ===== */
  .controls{
    position:absolute;
    right:18px;
    bottom:18px;
    display:flex;
    flex-direction:column;
    gap:8px;
    z-index:5;
  }
  .controls button{
    width:44px;
    height:44px;
    border-radius:10px;
    border:none;
    background:#fff;
    color:var(--primary);
    font-size:20px;
    font-weight:700;
    box-shadow:0 4px 12px rgba(83,82,238,.2);
    cursor:pointer;
  }
  .controls button:hover{
    background:var(--accent);
  }
  .controls .reset{
    font-size:14px;
  }

  .legend{
    position:absolute;
    left:18px;
    top:18px;
    background:#fff;
    border-radius:10px;
    padding:12px 16px;
    box-shadow:0 4px 12px rgba(83,82,238,.15);
    font-size:12px;
    display:flex;
    gap:16px;
    flex-wrap:wrap;
    max-width:260px;
  }
  .legend-item{
    display:flex;
    align-items:center;
    gap:6px;
    color:var(--ink);
    font-weight:600;
  }
  .legend-dot{
    width:12px;height:12px;
    border-radius:50%;
    background:var(--accent);
    border:2px solid var(--primary);
  }
  .legend-sq{
    width:12px;height:12px;
    border-radius:3px;
    background:var(--light);
    border:2px solid var(--primary);
  }

  /* ===== SIDE PANEL ===== */
  .panel{
    width:320px;
    padding:26px 24px;
    background:#fff;
    overflow-y:auto;
  }
  .panel-empty{
    color:#a5a4d8;
    font-size:14px;
    line-height:1.7;
    text-align:center;
    margin-top:60px;
  }
  .panel-empty .emoji{
    font-size:34px;
    display:block;
    margin-bottom:14px;
  }
  .panel-card{
    display:none;
  }
  .panel-card.show{
    display:block;
  }
  .panel-tag{
    display:inline-block;
    background:var(--accent);
    color:var(--ink);
    font-size:12px;
    font-weight:700;
    padding:5px 12px;
    border-radius:20px;
    margin-bottom:14px;
  }
  .panel-title{
    font-size:22px;
    font-weight:800;
    color:var(--primary);
    margin-bottom:12px;
    line-height:1.3;
  }
  .panel-desc{
    font-size:14px;
    line-height:1.7;
    color:#565587;
    margin-bottom:20px;
  }
  .panel-close{
    background:var(--light);
    color:#fff;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    font-weight:700;
    font-size:13px;
    cursor:pointer;
  }
  .panel-close:hover{
    background:var(--primary);
  }

  @media (max-width:800px){
    .layout{flex-direction:column; height:auto;}
    .map-wrap{height:60vh;}
    .panel{width:100%;}
    .legend{max-width:200px; font-size:11px;}
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="logo">Проектоград<span class="dot">.</span></div>
  <div class="socials">
    <a href="#" aria-label="Facebook"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 12a10 10 0 1 0-11.6 9.9v-7H7.9V12h2.5V9.8c0-2.5 1.5-3.9 3.8-3.9 1.1 0 2.2.2 2.2.2v2.4h-1.2c-1.2 0-1.6.8-1.6 1.6V12h2.8l-.4 2.9h-2.4v7A10 10 0 0 0 22 12Z"/></svg></a>
    <a href="#" aria-label="X"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.9 2H22l-7.5 8.6L23.3 22h-7l-5.5-6.7L4.5 22H1.4l8-9.2L1 2h7.2l5 6.1L18.9 2Zm-1.2 18h1.7L7.4 4H5.6l12.1 16Z"/></svg></a>
    <a href="#" aria-label="Instagram"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1"/></svg></a>
  </div>
</header>

<nav class="mainnav">
  <ul>
    <li class="active"><a href="#">Карта</a></li>
    <li><a href="#">О лагере</a></li>
    <li><a href="#">Смены</a></li>
    <li><a href="#">Расписание</a></li>
    <li><a href="#">Вожатые</a></li>
    <li><a href="#">Разделы ▾</a></li>

  </ul>
</nav>

<div class="layout">
  <div class="map-wrap">

    <div class="legend">
      <div class="legend-item"><span class="legend-sq"></span> Корпуса</div>
      <div class="legend-item"><span class="legend-dot"></span> Точки интереса</div>
    </div>

    <svg id="map" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">

      <!-- water -->
      <path class="water" d="M0,0 C60,120 10,260 70,400 C120,520 20,650 60,800 L0,800 L0,0 Z"/>

      <!-- lawns -->

      <polygon class="lawn" points="300,300 470,290 480,420 310,430"/>
      <polygon class="lawn" points="640,470 760,460 780,560 660,570"/>
      <polygon class="lawn" points="880,320 980,310 990,380 890,390"/>

      <!-- paths -->
      <path class="path-line" d="M250,120 L520,110 L700,60"/>
      <path class="path-line" d="M400,150 L410,420 L440,600"/>
      <path class="path-line" d="M250,250 L560,330 L780,300 L1000,260"/>
      <path class="path-line" d="M560,330 L640,470 L700,600"/>
      <path class="path-line" d="M120,400 L300,420 L440,600"/>

      <!-- secondary generic buildings -->
      <polygon class="building secondary" points="700,30 800,20 810,110 705,120"/>
      <polygon class="building secondary" points="900,90 970,80 980,140 905,150"/>
      <polygon class="building secondary" points="820,470 890,460 900,520 825,530"/>
      <polygon class="building secondary" points="700,520 770,510 780,580 705,590"/>
      <polygon class="building secondary" points="960,470 1050,460 1070,540 970,550"/>

      <!-- main buildings -->
      <!-- К2 -->
      <polygon class="building" points="230,80 330,60 350,170 240,190"/>
      <text class="sublabel" x="270" y="130">к2</text>

      <!-- К3 -->
      <polygon class="building" points="360,50 480,40 500,140 375,150"/>
      <text class="sublabel" x="420" y="100">к3</text>

      <!-- К1 -->
      <polygon class="building" points="210,220 320,210 335,420 225,430"/>
      <text class="sublabel" x="260" y="330">к1</text>

      <!-- auditorium -->
      <polygon class="building" points="520,270 600,260 615,360 535,370"/>

      <!-- roads outline circle drive -->
      <circle cx="700" cy="60" r="7" fill="none" stroke="#c8c7f0" stroke-width="3"/>

      <!-- markers -->
      <g class="marker" data-name="Проектоград" data-icon="🏢" data-desc="Главный корпус лагеря — административный центр и штаб проектной смены. Здесь проходят регистрация, работа педсостава и общие сборы." transform="translate(255,150)">
        <circle class="pin" r="15"/>
        <text class="icon" y="1">🏢</text>
      </g>

      <g class="marker" data-name="Проектог" data-icon="🏢" data-desc="Главный корпус лагеря — административный центр и штаб проектной смены. Здесь проходят регистрация, работа педсостава и общие сборы." transform="translate(600,150)">
        <circle class="pin" r="15"/>
        <text class="icon" y="1">🏢</text>
      </g>

      <text class="label" x="140" y="145">Проектоград</text>

      <g class="marker" data-name="Английский клуб" data-icon="🇬🇧" data-desc="Пространство для языковой практики: разговорные клубы, настольные игры на английском и киновечера в оригинале." transform="translate(1000,510)">
        <circle class="pin" r="15"/>
        <text class="icon" y="1">🇬🇧</text>
      </g>
      <text class="label" x="60" y="450">Английский клуб</text>

      <g class="marker" data-name="Столовая" data-icon="🍽️" data-desc="Трёхразовое питание по расписанию смены плюс полдник. Меню согласовано с диетологом лагеря." transform="translate(555,95)">
        <circle class="pin" r="15"/>
        <text class="icon" y="1">🍽️</text>
      </g>
      <text class="label" x="500" y="70">Столовая</text>

      <g class="marker" data-name="Звёздный университет" data-icon="🎓" data-desc="Актовый зал и лекторий: сюда съезжаются на общие лекции, защиты проектов и вечерние мероприятия." transform="translate(575,315)">
        <circle class="pin" r="15"/>
        <text class="icon" y="1">🎓</text>
      </g>
      <text class="label" x="620" y="335">Звёздный университет</text>

      <g class="marker" data-name="Спортплощадка" data-icon="⚽" data-desc="Открытая площадка для футбола, волейбола и утренней зарядки. Рядом раздевалки и питьевые фонтанчики." transform="translate(710,510)">
        <circle class="pin" r="15"/>
        <text class="icon" y="1">⚽</text>
      </g>
      <text class="label" x="655" y="500">Спортплощадка</text>

      <g class="marker" data-name="Корпус 1 (общежитие)" data-icon="🛏️" data-desc="Жилой корпус — комнаты отряда, комната вожатых на этаже и общая гостиная." transform="translate(270,325)">
        <circle class="pin" r="15"/>
        <text class="icon" y="1">🛏️</text>
      </g>

      <g class="marker" data-name="Корпус 2 (учебный)" data-icon="📚" data-desc="Учебные аудитории для профильных смен: медиа, IT, бизнес и другие направления." transform="translate(290,115)">
        <circle class="pin" r="15"/>
        <text class="icon" y="1">📚</text>
      </g>

      <g class="marker" data-name="Корпус 3 (творческий)" data-icon="🎨" data-desc="Мастерские для драм-студии, творческих проектов и факультативов." transform="translate(430,90)">
        <circle class="pin" r="15"/>
        <text class="icon" y="1">🎨</text>
      </g>

      <g class="marker" data-name="Вход на территорию" data-icon="🚪" data-desc="Контрольно-пропускной пункт: сюда приезжают родители и гости лагеря, здесь встречают заезд." transform="translate(700,60)">

    </svg>

    <div class="controls">
      <button id="zoomIn" title="Приблизить">+</button>
      <button id="zoomOut" title="Отдалить">–</button>
      <button id="zoomReset" class="reset" title="Сбросить">⤾</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-empty" id="panelEmpty">
      <span class="emoji">📍</span>
      Нажмите на метку на карте,<br>чтобы увидеть подробности об объекте лагеря
    </div>
    <div class="panel-card" id="panelCard">
      <div class="panel-tag" id="panelIcon">🏢</div>
      <div class="panel-title" id="panelTitle">Название</div>
      <div class="panel-desc" id="panelDesc">Описание</div>
      <button class="panel-close" id="panelClose">Закрыть</button>
    </div>
  </div>
</div>

<script>
  const svg = document.getElementById('map');
  const viewBox = { x: 0, y: 0, w: 1200, h: 800 };
  const MIN_W = 250, MAX_W = 1600;

  function updateViewBox(){
    svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
  }

  function clientToSvg(clientX, clientY){
    const rect = svg.getBoundingClientRect();
    return {
      x: viewBox.x + (clientX - rect.left) / rect.width * viewBox.w,
      y: viewBox.y + (clientY - rect.top) / rect.height * viewBox.h
    };
  }

  function zoomAt(factor, clientX, clientY){
    const newW = Math.min(MAX_W, Math.max(MIN_W, viewBox.w * factor));
    const actualFactor = newW / viewBox.w;
    const pt = clientToSvg(clientX, clientY);
    viewBox.x = pt.x - (pt.x - viewBox.x) * actualFactor;
    viewBox.y = pt.y - (pt.y - viewBox.y) * actualFactor;
    viewBox.w = newW;
    viewBox.h = newW * (800/1200);
    updateViewBox();
  }

  svg.addEventListener('wheel', e=>{
    e.preventDefault();
    const factor = e.deltaY > 0 ? 1.12 : 0.89;
    zoomAt(factor, e.clientX, e.clientY);
  }, { passive:false });

  // drag to pan
  let isPanning = false, dragged = false, start = {x:0,y:0}, startVB;
  svg.addEventListener('mousedown', e=>{
    isPanning = true; dragged = false;
    start = { x: e.clientX, y: e.clientY };
    startVB = { ...viewBox };
  });
  window.addEventListener('mousemove', e=>{
    if(!isPanning) return;
    const rect = svg.getBoundingClientRect();
    const dx = (e.clientX - start.x) / rect.width * viewBox.w;
    const dy = (e.clientY - start.y) / rect.height * viewBox.h;
    if(Math.abs(e.clientX-start.x) > 3 || Math.abs(e.clientY-start.y) > 3) dragged = true;
    viewBox.x = startVB.x - dx;
    viewBox.y = startVB.y - dy;
    updateViewBox();
  });
  window.addEventListener('mouseup', ()=>{ isPanning = false; });

  // touch support (pan + pinch)
  let touchStartDist = null, touchStartVB = null, touchStartMid = null;
  svg.addEventListener('touchstart', e=>{
    if(e.touches.length === 1){
      isPanning = true;
      start = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      startVB = { ...viewBox };
    } else if(e.touches.length === 2){
      isPanning = false;
      const [t1,t2] = e.touches;
      touchStartDist = Math.hypot(t2.clientX-t1.clientX, t2.clientY-t1.clientY);
      touchStartVB = { ...viewBox };
      touchStartMid = { x:(t1.clientX+t2.clientX)/2, y:(t1.clientY+t2.clientY)/2 };
    }
  }, { passive:true });

  svg.addEventListener('touchmove', e=>{
    if(e.touches.length === 1 && isPanning){
      const rect = svg.getBoundingClientRect();
      const dx = (e.touches[0].clientX - start.x) / rect.width * viewBox.w;
      const dy = (e.touches[0].clientY - start.y) / rect.height * viewBox.h;
      viewBox.x = startVB.x - dx;
      viewBox.y = startVB.y - dy;
      updateViewBox();
    } else if(e.touches.length === 2 && touchStartDist){
      const [t1,t2] = e.touches;
      const dist = Math.hypot(t2.clientX-t1.clientX, t2.clientY-t1.clientY);
      const factor = touchStartDist / dist;
      const newW = Math.min(MAX_W, Math.max(MIN_W, touchStartVB.w * factor));
      const actualFactor = newW / touchStartVB.w;
      const pt = clientToSvg(touchStartMid.x, touchStartMid.y);
      viewBox.x = pt.x - (pt.x - touchStartVB.x) * actualFactor;
      viewBox.y = pt.y - (pt.y - touchStartVB.y) * actualFactor;
      viewBox.w = newW;
      viewBox.h = newW * (800/1200);
      updateViewBox();
    }
  }, { passive:true });

  svg.addEventListener('touchend', ()=>{ isPanning=false; touchStartDist=null; });

  // zoom buttons
  document.getElementById('zoomIn').addEventListener('click', ()=>{
    const rect = svg.getBoundingClientRect();
    zoomAt(0.8, rect.left+rect.width/2, rect.top+rect.height/2);
  });
  document.getElementById('zoomOut').addEventListener('click', ()=>{
    const rect = svg.getBoundingClientRect();
    zoomAt(1.25, rect.left+rect.width/2, rect.top+rect.height/2);
  });
  document.getElementById('zoomReset').addEventListener('click', ()=>{
    viewBox.x=0; viewBox.y=0; viewBox.w=1200; viewBox.h=800;
    updateViewBox();
  });

  // markers -> panel
  const panelEmpty = document.getElementById('panelEmpty');
  const panelCard = document.getElementById('panelCard');
  const panelTitle = document.getElementById('panelTitle');
  const panelDesc = document.getElementById('panelDesc');
  const panelIcon = document.getElementById('panelIcon');

  document.querySelectorAll('.marker').forEach(m=>{
    m.addEventListener('click', e=>{
      e.stopPropagation();
      if(dragged) return;
      document.querySelectorAll('.marker').forEach(x=>x.classList.remove('active'));
      m.classList.add('active');
      panelTitle.textContent = m.dataset.name;
      panelDesc.textContent = m.dataset.desc;
      panelIcon.textContent = m.dataset.icon;
      panelEmpty.style.display = 'none';
      panelCard.classList.add('show');
    });
  });

  document.getElementById('panelClose').addEventListener('click', ()=>{
    panelCard.classList.remove('show');
    panelEmpty.style.display = 'block';
    document.querySelectorAll('.marker').forEach(x=>x.classList.remove('active'));
  });

  updateViewBox();
</script>

</body>
</html>
